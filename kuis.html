<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis - EduSmart</title>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark');
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 p-5 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="flex items-center gap-2 mb-8">
                <h1 class="text-xl font-black italic">Edu<span class="text-blue-600">Smart</span></h1>
            </div>
            
            <nav class="space-y-1.5 flex-1">
                <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent hover:border-slate-200 transition text-sm font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Home
                </a>
                <a href="materi.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent hover:border-slate-200 transition text-sm font-bold">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Materi
                </a>
                <a href="kuis.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-bold shadow-md shadow-blue-500/30 transition">
                    <i data-lucide="check-square" class="w-4 h-4"></i> Kuis
                </a>
            </nav>

            <div class="pt-5 border-t border-slate-100 dark:border-slate-700">
                <button onclick="toggleDark()" class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg transition active:scale-95 border border-slate-200 dark:border-slate-600">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-8 flex flex-col items-center">
            <header class="w-full max-w-2xl mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-white tracking-tight italic">Tantangan Kilat</h2>
                    <p id="soalKe" class="text-blue-600 font-black uppercase text-[10px] tracking-widest mt-1">Soal 1/3</p>
                </div>
                <div class="px-4 py-1.5 bg-white dark:bg-slate-800 rounded-full border border-slate-200 dark:border-slate-700 font-black text-[10px] text-blue-600 shadow-sm uppercase tracking-tight">
                    XP: <span id="xpText">0</span>
                </div>
            </header>

            <div id="quizContainer" class="max-w-2xl w-full bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 shadow-xl relative overflow-hidden">
                <div id="quizContent">
                    <h2 id="pertanyaan" class="text-lg font-black mb-8 leading-tight dark:text-white">Memuat Pertanyaan...</h2>
                    <div id="opsi" class="grid grid-cols-1 gap-3">
                        </div>
                </div>

                <div id="quizResult" class="hidden text-center py-6">
                    <div class="inline-block px-4 py-1 bg-blue-100 dark:bg-blue-900/40 text-blue-600 rounded-full text-[9px] font-black uppercase mb-4 tracking-widest">Achievement Unlocked</div>
                    <h2 class="text-2xl font-black mb-2 dark:text-white italic uppercase">Kuis Selesai!</h2>
                    <p class="text-slate-400 font-bold mb-8 text-[10px] uppercase tracking-widest">Progress Berhasil Disinkronkan</p>
                    <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition active:scale-95 uppercase tracking-widest text-[10px]">Ulangi Sesi</button>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
