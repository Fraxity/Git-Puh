<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart - Learning Dashboard</title>

    <script>
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="flex min-h-screen">
        
        <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 p-5 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="flex items-center gap-2 mb-8">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white shadow-md">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                </div>
                <h1 class="text-xl font-black italic">Edu<span class="text-blue-600">Smart</span></h1>
            </div>
            
            <nav class="space-y-1.5 flex-1">
                <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-bold shadow-md shadow-blue-500/30 transition">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Hiome
                </a>
                <a href="materi.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent hover:border-slate-200 transition text-sm font-bold">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Materi
                </a>
                <a href="kuis.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent hover:border-slate-200 transition text-sm font-bold">
                    <i data-lucide="check-square" class="w-4 h-4"></i> Kuis
                </a>
            </nav>

            <div class="pt-5 border-t border-slate-100 dark:border-slate-700">
                <button onclick="toggleDark()" class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg transition active:scale-95 border border-slate-200 dark:border-slate-600">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">Selamat Datang, <span id="displayFirstName">User</span></h2>
                    <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em] mt-1">Pantau perkembangan belajarmu</p>
                </div>
                
                <a href="profile.html" class="bg-white dark:bg-slate-800 px-4 py-2 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex items-center gap-3 hover:border-blue-400 transition-all group">
                    <div class="flex flex-col items-end">
                        <span id="userName" class="font-black text-xs uppercase tracking-tighter group-hover:text-blue-600 transition-colors">User</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Edit Profil</span>
                    </div>
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" class="w-10 h-10 rounded-full border-2 border-blue-100 dark:border-blue-900 object-cover">
                </a>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl">
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 shadow-sm transition-transform hover:scale-[1.01]">
                    <h3 class="text-slate-400 text-xs font-black uppercase tracking-widest">Experience Points</h3>
                    <p id="xpText" class="text-5xl font-black mt-2 text-slate-800 dark:text-white">0</p>
                    <div id="levelText" class="mt-4 text-[10px] font-black text-blue-600 bg-blue-50 dark:bg-blue-900/30 inline-block px-3 py-1 rounded-lg uppercase tracking-tight">
                        Level 0 Scholar
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-center">
                    <h3 class="text-slate-400 text-xs font-black uppercase tracking-widest mb-4 italic">Mastery Progress</h3>
                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-6 rounded-full border border-slate-200 dark:border-slate-600 overflow-hidden">
                        <div id="progressBar" class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Global Progress</p>
                        <span id="progressText" class="text-blue-600 font-black text-lg">0%</span>
                    </div>
                </div>

                <div class="md:col-span-2 mt-4">
                    <button onclick="resetData()" class="group flex items-center gap-3 text-red-400 hover:text-red-500 transition-colors">
                        <div class="p-2.5 border border-dashed border-red-200 dark:border-red-900/30 rounded-xl group-hover:bg-red-50 dark:group-hover:bg-red-900/10">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-widest">Reset Data Pembelajaran</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Render Ikon Lucide
            lucide.createIcons();

            // Load Profil
            const userData = JSON.parse(localStorage.getItem("user"));
            if(userData) {
                if(document.getElementById('userName')) document.getElementById('userName').innerText = userData.firstName;
                if(document.getElementById('displayFirstName')) document.getElementById('displayFirstName').innerText = userData.firstName;
                if(document.getElementById('userAvatar')) document.getElementById('userAvatar').src = userData.image;
            }

            loadDashboardData();
        });

        function loadDashboardData() {
            const xp = localStorage.getItem("xp") || 0;
            const progress = localStorage.getItem("progress") || 0;
            
            if(document.getElementById('xpText')) document.getElementById('xpText').innerText = xp;
            if(document.getElementById('progressText')) document.getElementById('progressText').innerText = progress + "%";
            if(document.getElementById('progressBar')) document.getElementById('progressBar').style.width = progress + "%";
        }

        function toggleDark() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }

        function resetData() {
            if(confirm("Hapus semua progress belajar?")) {
                localStorage.setItem("xp", 0);
                localStorage.setItem("progress", 0);
                location.reload();
            }
        }
    </script>
    <script src="js/app.js"></script>
</body>
</html>
