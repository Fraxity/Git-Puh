<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil - EduSmart</title>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark');
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 p-5 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="flex items-center gap-2 mb-8">
                <h1 class="text-xl font-black italic">Edu<span class="text-blue-600">Smart</span></h1>
            </div>
            <nav class="space-y-1.5 flex-1">
                <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent transition text-sm font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Home
                </a>
                <a href="materi.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent transition text-sm font-bold">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Materi
                </a>
                <a href="kuis.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 border border-transparent transition text-sm font-bold">
                    <i data-lucide="check-square" class="w-4 h-4"></i> Kuis
                </a>
            </nav>
            <div class="pt-5 border-t border-slate-100 dark:border-slate-700">
                <button onclick="toggleDark()" class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg border border-slate-200 dark:border-slate-600">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 lg:p-8 flex justify-center">
            <div class="max-w-md w-full">
                <header class="mb-8 text-center lg:text-left">
                    <h2 class="text-2xl font-black text-slate-800 dark:text-white tracking-tight">Pengaturan Profil</h2>
                    <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-0.5">Ubah identitas & foto profil</p>
                </header>

                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-700 shadow-xl">
                    <div class="flex flex-col items-center mb-8">
                        <div class="relative group cursor-pointer" onclick="document.getElementById('fileInput').click()">
                            <img id="currentAvatar" src="" class="w-28 h-28 rounded-full border-4 border-blue-100 dark:border-blue-900 shadow-lg object-cover bg-slate-100">
                            <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="camera" class="text-white w-6 h-6"></i>
                            </div>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
                        <p class="mt-3 text-[10px] font-black text-blue-600 uppercase">Klik foto untuk upload file</p>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nama Lengkap</label>
                            <input id="editName" type="text" class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-sm dark:text-white">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Atau Gunakan URL Foto</label>
                            <input id="editPhotoURL" type="text" placeholder="https://..." oninput="handleURLInput(this.value)" class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-bold text-sm dark:text-white">
                        </div>

                        <button onclick="saveProfile()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-500/30 mt-4 uppercase tracking-widest text-xs">
                            Simpan Perubahan
                        </button>
                    </div>
                </div>
                
                <a href="index.html" class="block text-center mt-6 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-blue-600 transition">Batal dan Kembali</a>
            </div>
        </main>
    </div>

    <script>
        let currentImageData = "";

        // Muat data awal
        document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(localStorage.getItem("user")) || { firstName: "Guest", image: "https://ui-avatars.com/api/?name=Guest" };
            document.getElementById('editName').value = userData.firstName;
            document.getElementById('editPhotoURL').value = userData.image.startsWith('data:') ? '' : userData.image;
            document.getElementById('currentAvatar').src = userData.image;
            currentImageData = userData.image;
        });

        // Handler Upload File
        function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('currentAvatar').src = e.target.result;
                    currentImageData = e.target.result;
                    document.getElementById('editPhotoURL').value = ""; // Kosongkan URL jika upload file
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Handler URL Input
        function handleURLInput(url) {
            if(url.trim() !== "") {
                document.getElementById('currentAvatar').src = url;
                currentImageData = url;
            }
        }

        // Simpan ke LocalStorage
        function saveProfile() {
            const newName = document.getElementById('editName').value;
            if(!newName) return alert("Nama tidak boleh kosong!");

            const updatedData = {
                firstName: newName,
                image: currentImageData
            };

            localStorage.setItem("user", JSON.stringify(updatedData));
            alert("Profil Berhasil Disimpan!");
            window.location.href = "index.html";
        }

        // Toggle Dark Mode dengan Sync LocalStorage
        function toggleDark() {
            const isDark = document.documentElement.classList.toggle('dark');
            if (isDark) {
                localStorage.setItem('darkMode', 'enabled');
            } else {
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
